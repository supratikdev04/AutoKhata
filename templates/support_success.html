<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Submitted | Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background: #ecf0f1;
        }
        .success-card {
            max-width: 450px;
            margin: 80px auto;
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .success-icon {
            font-size: 60px;
            color: #28a745;
        }
        .btn-rounded {
            border-radius: 30px;
        }
    </style>

</head>
<body>

<div class="success-card">
    <i class="bi bi-check-circle-fill success-icon"></i>
    <h3 class="fw-bold mt-3">Report Submitted!</h3>

    <p class="text-muted mt-2">
        Thank you for reporting the issue. Our support team will review your request and get back to you shortly.
    </p>

    <a href="/dashboard" class="btn btn-primary btn-rounded px-4 mt-3">
        <i class="bi bi-speedometer2"></i> Back to Dashboard
    </a>
</div>
<script>
  const savedTheme = localStorage.getItem("theme") || "dark";
  document.documentElement.setAttribute("data-theme", savedTheme);
</script>

</body>
</html>
