<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0f4f8, #d9e2ec);
            font-family: 'Poppins', sans-serif;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .card-header {
            background: #4f46e5; /* Indigo */
            color: #fff;
            font-weight: 600;
            text-align: center;
            font-size: 1.3rem;
            padding: 1rem;
        }

        .card-body {
            padding: 2rem;
        }

        .tagline {
            text-align: center;
            font-size: 0.95rem;
            color: #6b7280;
            margin-bottom: 1.5rem;
        }

        input.form-control {
            border-radius: 10px;
        }

        .btn-primary {
            border-radius: 10px;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .social-login button {
            width: 100%;
            margin-top: 0.5rem;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
            cursor: pointer;
        }

        .social-login .google-btn { background: #fff; border: 1px solid #ccc; color: #000; }
        .social-login .apple-btn { background: #000; color: #fff; border: none; }

        .input-group .btn-outline-secondary {
            border-radius: 0 10px 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card shadow-sm">
                <div class="card-header">
                    Login
                </div>
                <div class="tagline"  style="font-size: 24px; padding: 20px;" >Track your expenses, grow your savings</div>
                <div class="card-body">

                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" name="password" required>
                                <button type="button" class="btn btn-outline-secondary" id="togglePassword">Show</button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>

                    <!--div class="social-login mt-3">
                        <button class="google-btn">Login with Google</button>
                        <button class="apple-btn">Login with Apple</button>
                </div-->

                    <p class="mt-3 text-center">
                        Don't have an account?
                        <a href="{{ url_for('signup') }}">Sign up</a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
document.getElementById("togglePassword").addEventListener("click", function () {
    const passwordField = document.getElementById("password");
    if (passwordField.type === "password") {
        passwordField.type = "text";
        this.textContent = "Hide";
    } else {
        passwordField.type = "password";
        this.textContent = "Show";
    }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/service-worker.js");
  }
</script>

</body>
</html>
