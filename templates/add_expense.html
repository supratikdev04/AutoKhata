<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Add Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark.css') }}">

</head>

<body class="bg-light pt-4">

<h3 class="text-center">Add Expense</h3>

<div class="container">
    <div class="card mb-4 shadow-sm">

        <div class="card-header bg-primary text-white">Add All Of Your Expense</div>

        <form action="/add_expense" method="POST" enctype="multipart/form-data" class="row g-3 p-3">

            <div class="col-md-3 col-12">
                <!-- Category -->
                <label class="form-label">Category</label>
                <select class="form-select" name="category" id="category">
                    <option value="Auto" selected>Auto Detect</option>
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                </select>
                
                <label class="form-label mt-3">Subcategory</label>
                <select class="form-select" name="subcategory" id="subcategory">
                    <option value="">Auto Detect</option>
                </select>

                <!-- Subcategory ->
                <label class="form-label mt-3">Subcategory</label>
                <select class="form-select" name="subcategory" id="subcategory" required></select-->

                <!-- Amount -->
                <label class="form-label mt-3">Amount</label>
                <!--input type="number" step="0.01" class="form-control" name="amount" placeholder="ex: 100" required>
                <!-input type="number" step="0.01" class="form-control" id="amount" name="amount">
                <textarea class="form-control" id="note" name="note" rows="3"placeholder="e.g. Paid ₹2.5k for groceries"></textarea-->
                <input type="number" step="0.01"
                   class="form-control"
                   name="amount"
                   id="amount"
                   placeholder="ex: 100"
                   required>
            </div>

            <div class="col-md-3 col-12">
                <label class="form-label">Note</label>
                <!--input type="text" class="form-control" name="note" placeholder="Write a note about your expense"-->
                <input type="text"
                   class="form-control"
                   name="note"
                   id="note"
                   placeholder="Write a note about your expense">
            </div>
            <div class="col-md-3 col-12">
                <label class="form-label">Attachment (Receipt)</label>
                <!--input type="file"
                       name="attachment"
                       class="form-control"
                       accept=".jpg,.jpeg,.png,.pdf"-->
                <input type="file"
                   name="attachment"
                   id="receiptInput"
                   class="form-control"
                   accept="image/*"
                   capture="environment">
                <button type="button"
                    class="btn btn-outline-primary mt-2 w-100"
                    onclick="scanReceipt()">
                    📸 Scan Receipt
                </button>

            </div>
            <div class="col-md-3 col-12 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">Add</button>
            </div>
            <div class="mt-3">
                <a href="/" class="btn btn-primary">
                    ⬅ Back to Main Page
                </a>
            </div>
        </form>
    </div>
</div>

<script>
// Subcategories List
const subcategories = {
    Food: ["Breakfast", "Lunch", "Dinner", "Snacks", "Grocery", "Restaurant"],
    Travel: ["Bus", "Taxi", "Train", "Fuel", "Flight"],
    Shopping: ["Clothes", "Electronics", "Accessories", "Online"],
    Bills: ["Electricity", "Water", "Internet", "Phone"],
};

// Update subcategory dropdown
function updateSubcategories() {
    const category = document.getElementById("category").value;
    const subcatSelect = document.getElementById("subcategory");

    subcatSelect.innerHTML = "";

    // Add Auto Detect
    const autoOption = document.createElement("option");
    autoOption.value = "";
    autoOption.textContent = "Auto Detect";
    subcatSelect.appendChild(autoOption);

    if (subcategories[category]) {
        subcategories[category].forEach(sub => {
            const option = document.createElement("option");
            option.value = sub;
            option.textContent = sub;
            subcatSelect.appendChild(option);
        });
    }
}
// Load first category subcategories on page load
updateSubcategories();

// Update when category changes
document.getElementById("category").addEventListener("change", updateSubcategories);
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/service-worker.js");
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
document.querySelector("input[name='note']").addEventListener("input", function () {
    const text = this.value;
    const match = text.match(/\d+(\.\d{1,2})?/); // better mobile regex

    if (match) {
        document.querySelector("input[name='amount']").value = match[0];
    }
});
</script>
<script>
function extractAmount(text) {
    if (!text) return null;

    const lines = text
        .replace(/,/g, '')
        .replace(/[₹$Rs]/gi, '')
        .replace(/[^\w.\n ]/g, ' ')
        .toUpperCase()
        .split('\n')
        .map(l => l.trim())
        .filter(Boolean);

    // STRONG TOTAL KEYWORDS
    const TOTAL_KEYWORDS = [
        'GRAND TOTAL',
        'TOTAL AMOUNT',
        'AMOUNT PAYABLE',
        'NET TOTAL',
        'FINAL TOTAL',
        'TOTAL DUE',
        'PAYABLE AMOUNT',
        'TOTAL'
    ];

    //Lines to ignore completely
    const IGNORE_PATTERN = /CGST|SGST|GST|TAX|PHONE|MOBILE|GSTIN|INVOICE|BILL NO|ADDRESS|QTY|RATE/i;

    // PASS 1: keyword-based detection
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (IGNORE_PATTERN.test(line)) continue;

        if (TOTAL_KEYWORDS.some(k => line.includes(k))) {
            const match = line.match(/\d+(\.\d{1,2})?/);
            if (match) return Number(match[0]).toFixed(2);

            // check next line
            if (lines[i + 1]) {
                const nextMatch = lines[i + 1].match(/\d+(\.\d{1,2})?/);
                if (nextMatch) return Number(nextMatch[0]).toFixed(2);
            }
        }
    }

    // PASS 2: bottom-most reasonable amount
    const candidates = [];

    for (let i = 0; i < lines.length; i++) {
        if (IGNORE_PATTERN.test(lines[i])) continue;

        const nums = lines[i].match(/\d+(\.\d{1,2})?/g);
        if (!nums) continue;

        nums.forEach(n => {
            const value = Number(n);
            if (value > 1 && value < 1000000) {
                candidates.push({
                    value,
                    lineIndex: i
                });
            }
        });
    }

    if (candidates.length) {
        // pick the number closest to the bottom
        candidates.sort((a, b) => b.lineIndex - a.lineIndex);
        return candidates[0].value.toFixed(2);
    }

    return null;
}
</script>
<script>
async function scanReceipt() {
    const fileInput = document.getElementById("receiptInput");

    if (!fileInput || !fileInput.files.length) {
        alert("Please upload or capture a receipt");
        return;
    }

    const file = fileInput.files[0];
    const amountInput = document.getElementById("amount");
    const noteInput = document.getElementById("note");

    noteInput.value = "Scanning receipt...";
    amountInput.value = "";

    try {
        const result = await Tesseract.recognize(
            file,
            "eng",
            { logger: m => console.log(m) }
        );

        const text = result.data.text;
        console.log("OCR TEXT ↓↓↓");
        console.log(text);
        autoDetectCategory(text);
        const amount = extractAmount(text);
        if (amount) {
            amountInput.value = amount;
            noteInput.value = "Scanned from receipt";
        } else {
            noteInput.value = "Total not detected";
            alert("Could not detect TOTAL amount");
        }

    } catch (error) {
        console.error("OCR ERROR:", error);
        alert("Receipt scan failed");
    }
}
</script>
<script>
function autoDetectCategory(text) {
    if (!text) return;

    const content = text.toUpperCase();

    let detected = null;

    if (/ELECTRICITY|POWER|EB|WATER|INTERNET|BROADBAND|WIFI|MOBILE|RECHARGE/.test(content)) {
        detected = "Bills";
    }
    else if (/RESTAURANT|HOTEL|FOOD|CAFE|MEAL|DINNER|LUNCH/.test(content)) {
        detected = "Food";
    }
    else if (/PETROL|DIESEL|FUEL|CAB|TAXI|UBER|OLA|BUS|TRAIN|FLIGHT/.test(content)) {
        detected = "Travel";
    }
    else if (/AMAZON|FLIPKART|SHOPPING|STORE|MALL/.test(content)) {
        detected = "Shopping";
    }

    if (detected) {
        document.getElementById("category").value = detected;
        updateSubcategories(); // keep subcategory in sync
    }
}
</script>

</body>
</html>
