<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Add Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark.css') }}">

</head>

<body class="bg-light pt-4">

<h3 class="text-center">Add Expense</h3>

<div class="container">
    <div class="card mb-4 shadow-sm">

        <div class="card-header bg-primary text-white">Add All Of Your Expense</div>

        <form action="/add_expense" method="POST" enctype="multipart/form-data" class="row g-3 p-3">

            <div class="col-md-3 col-12">
                <!-- Category -->
                <label class="form-label">Category</label>
                <select class="form-select" name="category" id="category">
                    <option value="Auto" selected>Auto Detect</option>
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                </select>
                
                <label class="form-label mt-3">Subcategory</label>
                <select class="form-select" name="subcategory" id="subcategory">
                    <option value="">Auto Detect</option>
                </select>

                <!-- Subcategory ->
                <label class="form-label mt-3">Subcategory</label>
                <select class="form-select" name="subcategory" id="subcategory" required></select-->

                <!-- Amount -->
                <label class="form-label mt-3">Amount</label>
                <!--input type="number" step="0.01" class="form-control" name="amount" placeholder="ex: 100" required>
                <!-input type="number" step="0.01" class="form-control" id="amount" name="amount">
                <textarea class="form-control" id="note" name="note" rows="3"placeholder="e.g. Paid ₹2.5k for groceries"></textarea-->
                <input type="number" step="0.01"
                   class="form-control"
                   name="amount"
                   id="amount"
                   placeholder="ex: 100"
                   required>
            </div>

            <div class="col-md-3 col-12">
                <label class="form-label">Note</label>
                <!--input type="text" class="form-control" name="note" placeholder="Write a note about your expense"-->
                <input type="text"
                   class="form-control"
                   name="note"
                   id="note"
                   placeholder="Write a note about your expense">
            </div>
            <div class="col-md-3 col-12">
                <label class="form-label">Attachment (Receipt)</label>
                <!--input type="file"
                       name="attachment"
                       class="form-control"
                       accept=".jpg,.jpeg,.png,.pdf"-->
                <input type="file"
                   name="attachment"
                   id="receiptInput"
                   class="form-control"
                   accept="image/*"
                   capture="environment">
                <button type="button"
                    class="btn btn-outline-primary mt-2 w-100"
                    onclick="scanReceipt()">
                    📸 Scan Receipt
                </button>

            </div>
            <div class="col-md-3 col-12 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">Add</button>
            </div>
            <div class="mt-3">
                <a href="/" class="btn btn-primary">
                    ⬅ Back to Main Page
                </a>
            </div>
        </form>
    </div>
</div>

<script>
// Subcategories List
const subcategories = {
    Food: ["Breakfast", "Lunch", "Dinner", "Snacks", "Grocery", "Restaurant"],
    Travel: ["Bus", "Taxi", "Train", "Fuel", "Flight"],
    Shopping: ["Clothes", "Electronics", "Accessories", "Online"],
    Bills: ["Electricity", "Water", "Internet", "Phone"],
};

// Update subcategory dropdown
function updateSubcategories() {
    const category = document.getElementById("category").value;
    const subcatSelect = document.getElementById("subcategory");

    subcatSelect.innerHTML = "";

    // Add Auto Detect
    const autoOption = document.createElement("option");
    autoOption.value = "";
    autoOption.textContent = "Auto Detect";
    subcatSelect.appendChild(autoOption);

    if (subcategories[category]) {
        subcategories[category].forEach(sub => {
            const option = document.createElement("option");
            option.value = sub;
            option.textContent = sub;
            subcatSelect.appendChild(option);
        });
    }
}
// Load first category subcategories on page load
updateSubcategories();

// Update when category changes
document.getElementById("category").addEventListener("change", updateSubcategories);
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/service-worker.js");
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
document.querySelector("input[name='note']").addEventListener("input", function () {
    const text = this.value;
    const match = text.match(/\d+(\.\d{1,2})?/); // better mobile regex

    if (match) {
        document.querySelector("input[name='amount']").value = match[0];
    }
});
</script>
    
<script>
// MOBILE-FRIENDLY AMOUNT EXTRACTION
// EXTRACT TOTAL AMOUNT (UPPERCASE SAFE)
function extractAmount(text) {
    if (!text) return null;

    const lines = text
        .replace(/,/g, '')               // remove commas
        .replace(/[₹Rs]/gi, '')          // remove currency symbols
        .replace(/[^\w.\n:= ]/g, ' ')    // keep letters, numbers, dots, =, :, spaces
        .toUpperCase()                    // convert everything to uppercase
        .split("\n")
        .map(l => l.trim())
        .filter(Boolean);

    const keywords = [
        "TOTAL",
        "GRAND TOTAL",
        "AMOUNT PAYABLE",
        "NET TOTAL",
        "FINAL TOTAL",
        "AMOUNT DUE",
        "TOTAL AMOUNT",
        "BALANCE DUE",
        "AMOUNT OWED",
        "INVOICE AMOUNT",
        "BILL",
        "NET BILL"
    ];

    for (let i = 0; i < lines.length; i++) {
        // Skip tax lines
        if (/CGST|SGST|GST/i.test(lines[i])) continue;

        for (let key of keywords) {
            if (lines[i].includes(key)) {
                let match = lines[i].match(/\d+(\.\d{1,2})?/g);
                if (match && match.length) return parseFloat(match[match.length - 1]).toFixed(2);

                for (let j = 1; j <= 2; j++) {
                    if (lines[i + j]) {
                        match = lines[i + j].match(/\d+(\.\d{1,2})?/g);
                        if (match && match.length) return parseFloat(match[match.length - 1]).toFixed(2);
                    }
                }
            }
        }
    }

    // fallback: largest number < 1,000,000
    const allNumbers = lines.join(" ").match(/\d+(\.\d{1,2})?/g);
    if (allNumbers) {
        const filtered = allNumbers.map(Number).filter(n => n < 1000000);
        if (filtered.length) return Math.max(...filtered).toFixed(2);
    }

    return null;
}

// EXTRACT ITEMS / PARTICULARS (UPPERCASE SAFE)
function extractItems(text) {
    if (!text) return "";

    const lines = text
        .replace(/[₹]/g, '')                 // remove currency symbols
        .replace(/[^\w\s:.-]/g, ' ')         // remove special chars except : . -
        .toUpperCase()                        // convert everything to uppercase
        .toLowerCase()
        .split("\n")
        .map(l => l.trim())
        .filter(Boolean);

    const stopKeywords = [
        "TOTAL",
        "GRAND TOTAL",
        "AMOUNT PAYABLE",
        "NET TOTAL",
        "FINAL TOTAL",
        "AMOUNT DUE",
        "INVOICE AMOUNT",
        "BILL",
        "NET BILL"
    ];

    let items = [];

    for (let line of lines) {
        // Skip irrelevant lines
        if (/GSTIN|GST NO|CGST|SGST|TAX|INVOICE NO|MOBILE|PHONE|ADDR|ADDRESS|BILL NO/i.test(line)) continue;

        // Stop at total keywords
        if (stopKeywords.some(key => line.includes(key))) break;

        // Skip numeric-only lines
        if (/^\d+(\.\d{1,2})?$/.test(line)) continue;

        items.push(line);
    }

    return items.slice(0, 20).join(", "); // first 20 items
}

// OVERRIDE scanReceipt FUNCTION
async function scanReceipt() {
    const file = document.getElementById("receiptInput").files[0];
    if (!file) {
        alert("Please capture or upload a receipt");
        return;
    }

    const amountInput = document.getElementById("amount");
    const noteInput = document.getElementById("note");

    noteInput.value = "Scanning receipt...";
    amountInput.value = "";

    const { data: { text } } = await Tesseract.recognize(
        file,
        "eng",
        {
            logger: m => console.log(m),
            tessedit_pageseg_mode: 6,
            preserve_interword_spaces: 1
        }
    );

    console.log(text);

    // Fill note with smart items
    noteInput.value = extractItems(text);

    // Extract total amount
    const amount = extractAmount(text);
    if (amount) {
        amountInput.value = amount;
    }
}
</script>
</body>
</html>
