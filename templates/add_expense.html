<!DOCTYPE html>
<!-- Add Expense Form -->
<html>
  <head>
  <meta charset="UTF-8" />
  <h3 style="text-align:center;">Add Expense</h3>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body class ="bg-ligth pt4">
    <!-- ADD EXPENSE FORM -->
<div class="container">
    <div class="card mb-4 shadow-sm">
      <div class="card-header bg-primary text-white">Add Expense</div>
          <form action="/add_expense" method="POST" class="row g-3">

              <div class="col-md-3 col-12">
                <label class="form-label">Category</label>
                  <select class="form-select" name="category" id="category" required>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Other">Other</option>
                  </select>

                <label class="form-label mt-3">Subcategory</label>
                <input type="text" class="form-control" name="subcategory" placeholder="Enter subcategory" required>

                <label class="form-label mt-3">Amount</label>
                <input type="number" step="0.01" class="form-control" name="amount" placeholder="ex: 100" required>
              </div>

              <div class="col-md-3 col-12">
                  <label class="form-label">Note</label>
                  <input type="text" class="form-control" name="note" placeholder="Write a note about your expense">
              </div>

              <div class="col-md-3 col-12 d-flex align-items-end">
                  <button type="submit" class="btn btn-success w-100">Add</button>
              </div>

          </form>
      </div>
    </div>
</body>
</html>
