<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Add Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/static/manifest.json">
</head>

<body class="bg-light pt-4">

<h3 class="text-center">Add Expense</h3>

<div class="container">
    <div class="card mb-4 shadow-sm">

        <div class="card-header bg-primary text-white">Add Expense</div>

        <form action="/add_expense" method="POST" class="row g-3 p-3">

            <div class="col-md-3 col-12">
                <!-- Category -->
                <label class="form-label">Category</label>
                <select class="form-select" name="category" id="category" required>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                </select>

                <!-- Subcategory -->
                <label class="form-label mt-3">Subcategory</label>
                <select class="form-select" name="subcategory" id="subcategory" required></select>

                <!-- Amount -->
                <label class="form-label mt-3">Amount</label>
                <input type="number" step="0.01" class="form-control" name="amount" placeholder="ex: 100" required>
            </div>

            <div class="col-md-3 col-12">
                <label class="form-label">Note</label>
                <input type="text" class="form-control" name="note" placeholder="Write a note about your expense">
            </div>

            <div class="col-md-3 col-12 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">Add</button>
            </div>

        </form>
    </div>
</div>

<script>
// Subcategories List
const subcategories = {
    Food: ["Breakfast", "Lunch", "Dinner", "Snacks", "Grocery", "Other"],
    Transport: ["Bus", "Taxi", "Train", "Fuel", "Maintenance"],
    Shopping: ["Clothes", "Electronics", "Accessories", "Gifts"],
    Bills: ["Electricity", "Water", "Internet", "Phone", "Rent"],
};

// Update subcategory dropdown
function updateSubcategories() {
    const category = document.getElementById("category").value;
    const subcatSelect = document.getElementById("subcategory");

    subcatSelect.innerHTML = ""; // Clear old options

    subcategories[category].forEach(sub => {
        const option = document.createElement("option");
        option.value = sub;
        option.textContent = sub;
        subcatSelect.appendChild(option);
    });
}

// Load first category subcategories on page load
updateSubcategories();

// Update when category changes
document.getElementById("category").addEventListener("change", updateSubcategories);
</script>

</body>
</html>
