<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modify Expense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">

</head>
<body class="bg-light pt-4">

<div class="container">
    <h2 class="text-center mb-4" style="color:#3A1F0B">Modify Expense</h2>

    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            Modify Expense
        </div>
        <div class="card-body">
            <form method="POST" id="modifyForm" enctype="multipart/form-data">

                <!-- CATEGORY -->
                <label class="form-label">Category</label>
                <select class="form-select" name="category" id="category" required>
                    <option value="Food" {% if expense.category=='Food' %}selected{% endif %}>Food</option>
                    <option value="Transport" {% if expense.category=='Transport' %}selected{% endif %}>Transport</option>
                    <option value="Shopping" {% if expense.category=='Shopping' %}selected{% endif %}>Shopping</option>
                    <option value="Bills" {% if expense.category=='Bills' %}selected{% endif %}>Bills</option>
                    <option value="Others" {% if expense.category=='Others' %}selected{% endif %}>Others</option>
                </select>

                <!-- SUBCATEGORY -->
                <label class="form-label mt-3">Subcategory</label>
                <select class="form-select" name="subcategory" id="subcategory" required></select>

                <!-- AMOUNT -->
                <label class="form-label mt-3">Amount</label>
                <input type="number" class="form-control" name="amount" value="{{ expense.amount }}" required>

                <!-- NOTE -->
                <label class="form-label mt-3">Note</label>
                <input type="text" class="form-control" name="note" value="{{ expense.note }}">

                <!-- ATTACHMENT -->
                <label class="form-label mt-3">Attachment</label>
                {% if expense.attachment_url %}
                    <div class="mb-2">
                        <button type="button"class="btn btn-sm btn-outline-primary"
                                onclick="openAttachment('{{ expense.attachment_url }}')">
                            <i class="bi bi-paperclip"></i> View current attachment
                        </button>
                    </div>
                 <!-- UNIVERSAL ATTACHMENT PREVIEW MODAL -->
                    <div class="modal fade" id="attachmentModal" tabindex="-1">
                      <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
                        <div class="modal-content">
                          <div class="modal-header">
                            <h5 class="modal-title">Attachment Preview</h5>
                            <button class="btn-close" data-bs-dismiss="modal"></button>
                          </div>
                    
                          <div class="modal-body text-center">
                            <img id="previewImage" class="img-fluid d-none">
                            <iframe id="previewFrame" class="w-100 d-none" height="600"></iframe>
                    
                            <div id="previewFallback" class="d-none">
                              <p>Preview not available.</p>
                              <a id="downloadLink" class="btn btn-primary" target="_blank">Download</a>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" name="remove_attachment" id="remove_attachment">
                        <label class="form-check-label" for="remove_attachment">
                            Remove existing attachment
                        </label>
                    </div>
                {% endif %}
                <input type="file" name="attachment" class="form-control" accept=".jpg,.jpeg,.png,.pdf">
                <!--button type="button" class="btn btn-outline-primary btn-sm mt-2" onclick="scanAttachment()">
                    📸 Scan Attachment
                </button>
                <div id="scanStatus" class="form-text"></div-->
                <button class="btn btn-primary mt-4 w-100" type="submit" id="saveBtn" disabled>Save Changes</button>
                <a href="/" class="btn btn-secondary mt-3 w-100">Cancel</a>

            </form>
        </div>
    </div>
</div>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const subcategories = {
    Food: ["Breakfast", "Lunch", "Dinner", "Snacks", "Grocery", "Other"],
    Transport: ["Bus", "Taxi", "Train", "Fuel", "Maintenance"],
    Shopping: ["Clothes", "Electronics", "Accessories", "Gifts"],
    Bills: ["Electricity", "Water", "Internet", "Phone", "Rent"],
    Others: ["Misc", "Extra", "Other"]
};

// Update dropdown
function updateSubcategories() {
    const cat = document.getElementById("category").value;
    const sub = document.getElementById("subcategory");

    sub.innerHTML = "";

    subcategories[cat].forEach(item => {
        let opt = document.createElement("option");
        opt.value = item;
        opt.textContent = item;
        if (item === "{{ expense.subcategory }}") {
            opt.selected = true;
        }
        sub.appendChild(opt);
    });
}

// Load on start
updateSubcategories();

// Change event
document.getElementById("category").addEventListener("change", updateSubcategories);

// Enable save button only if changed
const form = document.getElementById("modifyForm");
const saveBtn = document.getElementById("saveBtn");
const initialData = new FormData(form);

form.addEventListener("input", () => {
    const currentData = new FormData(form);
    let changed = false;
    for (let [key, value] of currentData.entries()) {
        if (value !== initialData.get(key)) {
            changed = true;
            break;
        }
    }
    saveBtn.disabled = !changed;
});

// Register service worker
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/service-worker.js");
}
</script>
<script>
function openAttachment(url) {
    const img = document.getElementById("previewImage");
    const frame = document.getElementById("previewFrame");
    const fallback = document.getElementById("previewFallback");
    const download = document.getElementById("downloadLink");

    [img, frame, fallback].forEach(el => el.classList.add("d-none"));
    img.src = frame.src = "";

    const ext = url.split('.').pop().toLowerCase();

    if (["png","jpg","jpeg","gif","webp"].includes(ext)) {
        img.src = url;
        img.classList.remove("d-none");
    } else if (["pdf","txt","html"].includes(ext)) {
        frame.src = url;
        frame.classList.remove("d-none");
    } else {
        download.href = url;
        fallback.classList.remove("d-none");
    }

    new bootstrap.Modal(document.getElementById("attachmentModal")).show();
}
</script>
<!-- ===================== NEW: preprocessImage ===================== -->
<script>
// Grayscale + contrast boost before OCR — improves Tesseract accuracy on
// photos with shadows, low contrast, or uneven lighting.
function preprocessImage(file) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
 
        img.onerror = () => {
            URL.revokeObjectURL(url);
            reject(new Error("Image failed to load"));
        };
 
        img.onload = () => {
            try {
                const canvas = document.createElement("canvas");
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0);
 
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                    const contrasted = gray < 128
                        ? Math.max(0, gray - 40)
                        : Math.min(255, gray + 40);
                    data[i] = data[i + 1] = data[i + 2] = contrasted;
                }
                ctx.putImageData(imageData, 0, 0);
                URL.revokeObjectURL(url);
 
                // canvas.toBlob() can return null — must be checked, otherwise
                // Tesseract gets called with null and throws.
                canvas.toBlob((blob) => {
                    if (blob) {
                        resolve(blob);
                    } else {
                        reject(new Error("canvas.toBlob() returned null"));
                    }
                }, "image/png");
 
            } catch (err) {
                URL.revokeObjectURL(url);
                reject(err);
            }
        };
 
        img.src = url;
    });
}
</script>
 
<!-- ===================== NEW: extractAmount ===================== -->
<script>
function extractAmount(text) {
    if (!text) return null;
 
    // Normalize common OCR mistakes, and strip thousand-separator commas
    // ("1,234.00" would otherwise split into "1" and "234.00")
    text = text
        .replace(/0TAL/g, 'TOTAL')
        .replace(/T0TAL/g, 'TOTAL')
        .replace(/AM0UNT/g, 'AMOUNT')
        .replace(/(\d),(\d{3})/g, '$1$2');
 
    const lines = text
        .toUpperCase()
        .split('\n')
        .map(l => l.trim())
        .filter(Boolean);
 
    const TOTAL_WORDS = ['TOTAL', 'GRAND TOTAL', 'NET TOTAL', 'PAYABLE', 'NET PAYABLE', 'CASH'];
 
    // Word-boundary regex so "RS" doesn't match inside words like GROCERIES
    const CURRENCY_RE = /₹|\bRS\.?\b|\bINR\b/;
 
    const IGNORE = /GST|CGST|SGST|TAX|PHONE|MOBILE|GSTIN|INVOICE|BILL\s*NO|QTY|RATE|PER\s*UNIT|PRICE|DISCOUNT|\bMRP\b/;
 
    let candidates = [];
 
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
 
        if (IGNORE.test(line)) continue;
 
        const numbers = line.match(/\d+(\.\d{1,2})?/g);
        if (!numbers) continue;
 
        const hasTotalWord = TOTAL_WORDS.some(w => line.includes(w));
        const hasCurrencyWord = CURRENCY_RE.test(line);
 
        numbers.forEach(n => {
            const value = Number(n);
            if (value > 1 && value < 1000000) {
                candidates.push({
                    value,
                    index: i,
                    strong: hasTotalWord,
                    currency: hasCurrencyWord
                });
            }
        });
    }
 
    // 1) Best: a TOTAL-keyword line that also has a currency symbol
    const bestBoth = candidates.filter(c => c.strong && c.currency);
    if (bestBoth.length) {
        bestBoth.sort((a, b) => b.index - a.index);
        return bestBoth[0].value.toFixed(2);
    }
 
    // 2) TOTAL-keyword lines — pick the largest value on those lines
    const strong = candidates.filter(c => c.strong);
    if (strong.length) {
        strong.sort((a, b) => b.value - a.value);
        return strong[0].value.toFixed(2);
    }
 
    // 3) Lines with a currency symbol, bottom-most
    const currency = candidates.filter(c => c.currency);
    if (currency.length) {
        currency.sort((a, b) => b.index - a.index);
        return currency[0].value.toFixed(2);
    }
 
    // 4) Fallback — largest number anywhere
    if (candidates.length) {
        candidates.sort((a, b) => b.value - a.value);
        return candidates[0].value.toFixed(2);
    }
 
    return null;
}
</script>
 
<!-- ===================== NEW: detectCategory ===================== -->
<script>
// Returns a category string matching this page's <select> options, or null
// if nothing matches (so we don't override a category the user already set).
function detectCategory(text) {
    if (!text) return null;
 
    const content = text.toUpperCase();
 
    if (/ELECTRICITY|POWER|\bEB\b|WATER|INTERNET|BROADBAND|WIFI|MOBILE|RECHARGE|RENT/.test(content)) {
        return "Bills";
    }
    if (/RESTAURANT|HOTEL|FOOD|CAFE|MEAL|BREAKFAST|LUNCH|DINNER|SNACK|GROCERY/.test(content)) {
        return "Food";
    }
    if (/PETROL|DIESEL|FUEL|CAB|TAXI|UBER|OLA|BUS|TRAIN|FLIGHT|METRO|PARKING/.test(content)) {
        return "Transport";
    }
    if (/AMAZON|FLIPKART|SHOPPING|STORE|MALL|CLOTHES|ELECTRONICS/.test(content)) {
        return "Shopping";
    }
 
    return null;
}
</script>
<!------button triggered scan ------>
<script>
// Clear any stale status message when a new file is picked, so an old
// "Detected..." message doesn't linger after swapping the attachment.
document.getElementById("attachmentInput").addEventListener("change", () => {
    const statusEl = document.getElementById("scanStatus");
    statusEl.textContent = "";
    statusEl.classList.remove("text-success", "text-danger");
});
 
async function scanAttachment() {
    const fileInput = document.getElementById("attachmentInput");
    const statusEl = document.getElementById("scanStatus");
 
    if (!fileInput.files.length) {
        statusEl.textContent = "Please attach an image first";
        statusEl.classList.remove("text-success");
        statusEl.classList.add("text-danger");
        return;
    }
 
    const file = fileInput.files[0];
 
    if (!file.type.startsWith("image/")) {
        statusEl.textContent = "OCR only works on image files, not PDFs";
        statusEl.classList.remove("text-success");
        statusEl.classList.add("text-danger");
        return;
    }
 
    statusEl.textContent = "Scanning receipt...";
    statusEl.classList.remove("text-success", "text-danger");
 
    try {
        // Fall back to the raw file if preprocessing fails for any reason
        let imageSource = file;
        try {
            imageSource = await preprocessImage(file);
        } catch (preprocErr) {
            console.warn("Preprocessing failed, using raw image:", preprocErr);
        }
 
        const result = await Tesseract.recognize(imageSource, "eng");
        const text = result.data.text;
 
        console.log("OCR raw output:\n", text);
 
        const amount = extractAmount(text);
        const category = detectCategory(text);
 
        if (amount) {
            document.getElementById("amount").value = amount;
        }
        if (category) {
            document.getElementById("category").value = category;
            updateSubcategories();
        }
 
        if (amount || category) {
            const parts = [];
            if (amount) parts.push("amount ₹" + amount);
            if (category) parts.push("category " + category);
            statusEl.textContent = "Detected " + parts.join(" and ");
            statusEl.classList.remove("text-danger");
            statusEl.classList.add("text-success");
        } else {
            statusEl.textContent = "Could not detect amount or category from this image";
            statusEl.classList.remove("text-success");
            statusEl.classList.add("text-danger");
        }
 
        // Amount/category are set programmatically and won't fire a native
        // input event on their own — re-check changed state so Save reflects
        // the detected values (file selection already enables it too).
        form.dispatchEvent(new Event("input", { bubbles: true }));
 
    } catch (error) {
        console.error("Scan error:", error);
        statusEl.textContent = "Receipt scan failed: " + error.message;
        statusEl.classList.remove("text-success");
        statusEl.classList.add("text-danger");
    }
}
</script>
