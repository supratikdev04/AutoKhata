<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
    body.dark-mode {
        background-color: #121212 !important;
        color: white !important;
    }

    .card.dark-mode {
        background-color: #1e1e1e !important;
        color: white !important;
        border-color: #333;
    }

    .table.dark-mode {
        color: white !important;
    }

    .table.dark-mode tbody tr {
        background-color: #1e1e1e !important;
        color: white;
    }

    .dropdown-menu.dark-mode {
        background-color: #1e1e1e;
        color: white;
    }
</style>
</head>
<script>
    const toggleBtn = document.getElementById("darkModeToggle");
    const icon = document.getElementById("darkModeIcon");

    // Load saved theme
    if (localStorage.getItem("darkMode") === "enabled") {
        enableDarkMode();
    }

    toggleBtn.addEventListener("click", function () {
        if (document.body.classList.contains("dark-mode")) {
            disableDarkMode();
        } else {
            enableDarkMode();
        }
    });

    function enableDarkMode() {
        document.body.classList.add("dark-mode");

        document.querySelectorAll(".card").forEach(card => card.classList.add("dark-mode"));
        document.querySelectorAll(".table").forEach(t => t.classList.add("dark-mode"));
        document.querySelectorAll(".dropdown-menu").forEach(d => d.classList.add("dark-mode"));

        icon.classList.remove("bi-moon-fill");
        icon.classList.add("bi-brightness-high-fill");

        localStorage.setItem("darkMode", "enabled");
    }

    function disableDarkMode() {
        document.body.classList.remove("dark-mode");

        document.querySelectorAll(".card").forEach(card => card.classList.remove("dark-mode"));
        document.querySelectorAll(".table").forEach(t => t.classList.remove("dark-mode"));
        document.querySelectorAll(".dropdown-menu").forEach(d => d.classList.remove("dark-mode"));

        icon.classList.remove("bi-brightness-high-fill");
        icon.classList.add("bi-moon-fill");

        localStorage.setItem("darkMode", "disabled");
    }
</script>

<body class="bg-light">

<div class="container my-5">

    <!-- TOP BAR -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 class="m-0">Expense Tracker</h1>

        <div class="d-flex align-items-center">

            <!-- Profile Dropdown -->
            <div class="dropdown me-3">
                <button class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle"></i>
                </button>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                    <button class="dropdown-item d-flex justify-content-between align-items-center" id="darkModeToggle">
                    Dark Mode 
                    <i class="bi bi-moon-fill" id="darkModeIcon"></i>
                    </button></li>
                    <li><a class="dropdown-item" href="/profile">My Profile</a></li>
                    <li><a class="dropdown-item" href="/settings">Settings</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger" href="/logout">Logout</a></li>
                </ul>
            </div>

            <!-- Email -->
            <span class="fw-bold text-primary">{{ session.email }}</span>
        </div>

    </div>
    <!-- END TOP BAR -->


    <!-- Add Expense Form -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">
            Add Expense
        </div>
        <div class="card-body">
            <form method="POST" class="row g-3">

                <div class="col-md-3">
                    <label class="form-label">Amount</label>
                    <input type="number" step="0.01" class="form-control" name="amount" placeholder="ex: $1000" required>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Category</label>
                    <select class="form-select" name="category" required>
                        <option value="">----Select----</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Note</label>
                    <input type="text" class="form-control" name="note" placeholder="Write a note about your expense">
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-success w-100">Add</button>
                </div>

            </form>
        </div>
    </div>


    <!-- Expenses Table -->
    <div class="card shadow-sm">
        <div class="card-header bg-secondary text-white">
            Your Expenses
        </div>
        <div class="card-body table-responsive">

            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Note</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for item in expense %}
                    <tr>
                        <td>{{ item.next_date }}</td>
                        <td>${{ item.amount }}</td>
                        <td>{{ item.category }}</td>
                        <td>{{ item.note }}</td>
                        <td>
                            <a href="/delete/{{ item.id }}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <p class="mt-3"><b>Total:</b> ${{ total }}</p>
        </div>
    </div>

</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
