<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="/static/manifest.json">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #d1fae5, #a7f3d0); /* Teal/Green gradient */
            font-family: 'Poppins', sans-serif;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .card-header {
            background: #10b981; /* Emerald / teal */
            color: #fff;
            font-weight: 600;
            text-align: center;
            font-size: 1.3rem;
            padding: 1rem;
        }

        .card-body {
            padding: 2rem;
        }

        .tagline {
            text-align: center;
            font-size: 0.95rem;
            color: #065f46; /* Dark teal */
            margin-bottom: 1.5rem;
        }

        input.form-control {
            border-radius: 10px;
        }

        .btn-success {
            border-radius: 10px;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .btn-success:hover {
            background: #059669; /* Darker emerald */
        }

    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card shadow-sm">
                <div class="card-header">
                    Create Account
                </div>
                <div class="tagline">Join now and start tracking your expenses!</div>
                <div class="card-body">

                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="phone_number" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="phone_number" name="phone_number" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="mb-3">
                            <label for="address" class="form-label">Address</label>
                            <input type="text" class="form-control" id="address" name="address" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Sign Up</button>
                    </form>

                    <p class="mt-3 text-center">
                        Already have an account?
                        <a href="{{ url_for('login') }}">Login</a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/service-worker.js");
  }
</script>

</body>
</html>
