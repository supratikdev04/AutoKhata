<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download Expenses</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
      
</head>

<body class="d-flex align-items-center" style="min-height:100vh;">

<div class="container mt-5">
    <h2 class="text-center mb-4" style="color:#FFE6CC">Download Expenses</h2>
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <i class="bi bi-download"></i> Download Expenses
        </div>

        <div class="card-body">
            <form method="POST" action="/download-expenses">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">From Date</label>
                        <input type="date" name="start_date" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">To Date</label>
                        <input type="date" name="end_date" class="form-control" required>
                    </div>
                </div>

               <div class="mb-3">
                    <label class="form-label">Download As</label>
                    <select name="file_type" class="form-select" required>
                        <option value="csv">CSV</option>
                        <option value="pdf">PDF</option>
                    </select>
                </div>
                 <div class="d-grid">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-file-earmark-arrow-down"></i> Download
                    </button>
                </div>
            </form>
             <div class="mt-3">
                <a href="/" class="btn btn-primary">
                    ⬅ Back to Main Page
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const savedTheme = localStorage.getItem("theme") || "dark";
  document.documentElement.setAttribute("data-theme", savedTheme);
</script>

</body>
</html>
